<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Theater | BookMyTicket</title>

<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
	--bg-main: #1c1f26;
	--bg-card: #262a33;
	--border-soft: #343842;
	--text-main: #ffffff;
	--text-muted: #c2c6cf;
	--accent: #e53935;
	--danger: #ef4444;
}

/* ===== GLOBAL ===== */
body {
	font-family: "Poppins", sans-serif;
	background: linear-gradient(180deg, #2b2f3a, #1c1f26);
	min-height: 100vh;
	display: flex;
	align-items: center;
	justify-content: center;
	color: var(--text-main);
	padding: 20px;
}

/* ===== CONTAINER ===== */
.form-container {
	width: 100%;
	display: flex;
	justify-content: center;
}

/* ===== CARD ===== */
.form-box {
	width: 100%;
	max-width: 460px;
	padding: 40px;
	background: var(--bg-card);
	border-radius: 16px;
	border: 1px solid var(--border-soft);
	box-shadow: 0 20px 45px rgba(0,0,0,0.6);
	animation: fadeInUp .4s ease;
}

/* ===== TITLE ===== */
.form-box h2 {
	text-align: center;
	margin-bottom: 30px;
	font-weight: 800;
	font-size: 1.7rem;
}

/* ===== FORM ===== */
.form-group {
	margin-bottom: 20px;
}

label {
	display: block;
	margin-bottom: 6px;
	font-weight: 600;
	font-size: .85rem;
	color: var(--text-muted);
}

.form-control,
.form-file {
	background: #1f232b;
	border: 1px solid var(--border-soft);
	border-radius: 10px;
	padding: 11px 14px;
	font-size: .9rem;
	color: var(--text-main);
	width: 100%;
}

.form-control::placeholder {
	color: #9aa0ab;
}

.form-control:focus,
.form-file:focus {
	background: #1f232b;
	border-color: var(--accent);
	box-shadow: none;
	color: var(--text-main);
}

/* ===== FILE BUTTON ===== */
.form-file::file-selector-button {
	background: var(--accent);
	border: none;
	color: white;
	padding: 6px 12px;
	border-radius: 6px;
	font-weight: 600;
	margin-right: 10px;
	cursor: pointer;
}

/* ===== ERRORS ===== */
.error-text {
	color: var(--danger);
	font-size: .75rem;
	margin-top: 4px;
	font-weight: 600;
}

/* ===== IMAGE PREVIEW ===== */
.image-preview {
	text-align: center;
	margin-bottom: 18px;
}

.image-preview img {
	max-width: 100%;
	max-height: 180px;
	border-radius: 12px;
	border: 1px solid var(--border-soft);
	box-shadow: 0 10px 25px rgba(0,0,0,0.6);
}

.image-note {
	font-size: .75rem;
	color: var(--text-muted);
	margin-top: 6px;
}

/* ===== BUTTON ===== */
.btn-submit {
	width: 100%;
	background: var(--accent);
	border: none;
	color: white;
	font-weight: 700;
	padding: 12px;
	border-radius: 10px;
	font-size: .95rem;
	margin-top: 10px;
	transition: .2s ease;
}

.btn-submit:hover {
	background: #f44336;
}

/* ===== BACK LINK ===== */
.back-link {
	text-align: center;
	margin-top: 22px;
}

.back-link a {
	color: var(--text-muted);
	font-weight: 600;
	text-decoration: none;
}

.back-link a:hover {
	color: var(--accent);
}

/* ===== ANIMATION ===== */
@keyframes fadeInUp {
	from { opacity: 0; transform: translateY(20px); }
	to { opacity: 1; transform: translateY(0); }
}

/* ===== MOBILE ===== */
@media (max-width:768px) {
	.form-box {
		padding: 30px;
	}
	.form-box h2 {
		font-size: 1.5rem;
	}
}
</style>
</head>

<body>

<div class="form-container">
	<div class="form-box">

		<h2>✏️ Edit Theater</h2>

		<form action="/update-theater" method="post"
		      enctype="multipart/form-data"
		      th:object="${theaterDto}">

			<input type="hidden" name="id" th:value="${id}">

			<div class="form-group">
				<label>Theater Name</label>
				<input type="text" th:field="*{name}" class="form-control" placeholder="Theater name">
				<div class="error-text" th:errors="*{name}"></div>
			</div>

			<div class="form-group">
				<label>Address</label>
				<input type="text" th:field="*{address}" class="form-control" placeholder="Theater address">
				<div class="error-text" th:errors="*{address}"></div>
			</div>

			<div class="form-group">
				<label>Location Link</label>
				<input type="text" th:field="*{locationLink}" class="form-control" placeholder="Google Maps link">
				<div class="error-text" th:errors="*{locationLink}"></div>
			</div>

			<div class="image-preview">
				<img th:src="${imageLink}" alt="Theater Image">
				<p class="image-note">Current theater image</p>
			</div>

			<div class="form-group">
				<label>Update Image (Optional)</label>
				<input type="file" th:field="*{image}" class="form-file">
				<p class="image-note">Leave empty to keep current image</p>
				<div class="error-text" th:errors="*{image}"></div>
			</div>

			<button type="submit" class="btn-submit">Update Theater</button>

			<div class="back-link">
				<a href="/manage-theaters">← Back to Theaters</a>
			</div>

		</form>

	</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
