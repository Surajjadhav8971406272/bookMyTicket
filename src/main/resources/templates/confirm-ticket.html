<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirm Booking | BookMyTicket</title>

<link rel="icon" type="image/svg+xml" href="/favicon.svg">

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap"
	rel="stylesheet">

<style>

:root {
	--bg-main: #1c1f26;
	--bg-card: #262a33;
	--border-soft: #343842;
	--text-main: #ffffff;
	--text-muted: #c2c6cf;
	--accent: #e53935;
	--success: #22c55e;
}

/* ===== GLOBAL ===== */
* {
	box-sizing: border-box;
}

body {
	font-family: "Poppins", sans-serif;
	background: linear-gradient(180deg, #2b2f3a, #1c1f26);
	min-height: 100vh;
	color: var(--text-main);
	padding: 30px 15px;
}

/* ===== CONTAINER ===== */
.container {
	max-width: 900px;
}

/* ===== CARD ===== */
.card {
	background: var(--bg-card);
	border-radius: 18px;
	border: 1px solid var(--border-soft);
	box-shadow: 0 25px 55px rgba(0,0,0,0.65);
	padding: 35px;
	animation: fadeInUp .4s ease;
}

/* ===== SECTION TITLE ===== */
.section-title {
	font-weight: 800;
	font-size: 1.25rem;
	margin-bottom: 18px;
	letter-spacing: .4px;
	display: flex;
	align-items: center;
	gap: 8px;
	color: #ffffff;
}

/* ===== INFO ROWS ===== */
.info-row {
	display: flex;
	justify-content: space-between;
	align-items: center;
	border-bottom: 1px dashed var(--border-soft);
	padding: 12px 0;
	font-size: .95rem;
}

.info-row strong {
	color: #ffffff;
	font-weight: 600;
}

.info-row span {
	color: #ffffff;
	font-weight: 500;
}

/* ===== SEATS ===== */
.seat-box {
	display: inline-block;
	background: linear-gradient(135deg, #22c55e, #16a34a);
	color: #ffffff;
	padding: 6px 14px;
	border-radius: 18px;
	margin: 5px;
	font-weight: 700;
	font-size: .85rem;
	box-shadow: 0 6px 18px rgba(34,197,94,0.35);
}

/* ===== PRICE ===== */
.total {
	font-size: 1.35rem;
	font-weight: 900;
	color: var(--success);
	margin-top: 14px;
}

/* ===== BUTTONS ===== */
.btn-cancel {
	background: transparent;
	border: 1px solid var(--border-soft);
	color: var(--text-muted);
	padding: 10px 18px;
	border-radius: 10px;
	font-weight: 600;
	transition: .2s ease;
}

.btn-cancel:hover {
	color: #ffffff;
	border-color: #ffffff;
}

.btn-confirm {
	background: linear-gradient(135deg, #e53935, #ff5252);
	border: none;
	color: #ffffff;
	padding: 12px 26px;
	border-radius: 12px;
	font-weight: 700;
	box-shadow: 0 12px 30px rgba(229,57,53,0.45);
	transition: .25s ease;
}

.btn-confirm:hover {
	transform: translateY(-2px);
	box-shadow: 0 18px 45px rgba(229,57,53,0.6);
}

/* ===== HR ===== */
hr {
	border-color: rgba(255,255,255,0.15);
	margin: 22px 0;
}

/* ===== ANIMATION ===== */
@keyframes fadeInUp {
	from {
		opacity: 0;
		transform: translateY(20px);
	}
	to {
		opacity: 1;
		transform: translateY(0);
	}
}

/* ===== RESPONSIVE ===== */
@media (max-width:768px) {
	.card {
		padding: 25px;
	}
	.info-row {
		flex-direction: column;
		align-items: flex-start;
		gap: 6px;
	}
}



</style>
</head>

<body>

	<div class="container">

		<div class="card">

			<!-- MOVIE DETAILS -->
			<h3 class="section-title">🎬 Movie Details</h3>

			<div class="info-row">
				<strong>Movie</strong> <span th:text="${show.movie.name}"></span>
			</div>

			<div class="info-row">
				<strong>Date</strong> <span th:text="${show.showDate}"></span>
			</div>

			<div class="info-row">
				<strong>Time</strong> <span> <span
					th:text="${show.startTime}"></span> - <span
					th:text="${show.endTime}"></span>
				</span>
			</div>

			<hr>

			<!-- SEATS -->
			<h3 class="section-title">🪑 Selected Seats</h3>

			<div>
				<span th:each="seat : ${showSeats}" class="seat-box"
					th:text="${seat.seat.seatNumber}"> </span>
			</div>

			<hr>

			<!-- PRICE -->
			<h3 class="section-title">💰 Price Summary</h3>

			<div class="info-row">
				<strong>Ticket Price</strong> <span>₹ <span
					th:text="${show.ticketPrice}"></span> × <span
					th:text="${#lists.size(showSeats)}"></span></span>
			</div>

			<div class="total">
				Total: ₹ <span
					th:text="${show.ticketPrice * #lists.size(showSeats)}"></span>
			</div>

			<hr>

			<!-- ACTIONS -->
			<div class="text-end mt-4">
				<a href="/" class="btn btn-cancel">Cancel</a>
				<button class="btn btn-confirm ms-2" id="rzp-button1">
					Confirm & Pay</button>
			</div>

		</div>
	</div>

	<!-- Razorpay -->
	<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
	<script>
		var options = {
			"key" : "[[${key}]]",
			"amount" : "[[${amount}]]",
			"currency" : "[[${currency}]]",
			"name" : "Book My Ticket",
			"description" : "Movie Ticket Booking",
			"image" : "https://miro.medium.com/v2/resize:fit:1024/1*S9eGTVGyjaDlkNOlnDj_jQ.png",
			"order_id" : "[[${orderId}]]",
			"callback_url" : "/confirm-ticket",
			"prefill" : {
				"name" : "[[${user.name}]]",
				"email" : "[[${user.email}]]",
				"contact" : "[[${user.mobile}]]"
			},
			"theme" : {
				"color" : "#e74c3c"
			}
		};

		var rzp1 = new Razorpay(options);
		document.getElementById("rzp-button1").onclick = function(e) {
			rzp1.open();
			e.preventDefault();
		};
	</script>

</body>
</html>
