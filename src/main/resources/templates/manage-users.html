<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Users | BookMyTicket</title>

<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
:root {
	--bg-main: #1c1f26;
	--bg-card: #262a33;
	--border-soft: #343842;
	--text-main: #ffffff;
	--text-muted: #c2c6cf;
	--accent: #e53935;
	--success: #22c55e;
	--danger: #ef4444;
}

/* ===== GLOBAL ===== */
body {
	font-family: "Poppins", sans-serif;
	background: linear-gradient(180deg, #2b2f3a, #1c1f26);
	min-height: 100vh;
	color: var(--text-main);
}

/* ===== NAVBAR ===== */
.navbar {
	background: #1b1e25;
	border-bottom: 1px solid var(--border-soft);
	padding: 1rem 2rem;
}

.navbar-brand {
	font-weight: 900;
	font-size: 1.4rem;
	color: #e53935;
}

.nav-link {
	color: var(--text-muted) !important;
	font-weight: 600;
	margin-left: 1rem;
}

.nav-link:hover {
	color: #fff !important;
}

/* ===== CONTAINER ===== */
.admin-container {
	max-width: 1200px;
	margin: auto;
	padding: 50px 20px;
}

/* ===== HEADER ===== */
.admin-header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	flex-wrap: wrap;
	gap: 20px;
	margin-bottom: 30px;
}

.admin-header h1 {
	font-weight: 900;
	font-size: 1.9rem;
}

.back-link {
	background: #e53935;
	color: #fff;
	font-weight: 700;
	padding: .6rem 1.6rem;
	border-radius: 10px;
	text-decoration: none;
}

.back-link:hover {
	background: #f44336;
	color: #fff;
}

/* ===== TABLE ===== */
.table-wrapper {
	background: var(--bg-card);
	border-radius: 14px;
	border: 1px solid var(--border-soft);
	box-shadow: 0 25px 60px rgba(0,0,0,.7);
	overflow: hidden;
}

.table {
	margin: 0;
	color: var(--text-main);
}

.table thead th {
	background: #1f232b;
	color: var(--text-muted);
	font-size: .75rem;
	text-transform: uppercase;
	letter-spacing: 1px;
	font-weight: 700;
	padding: 16px;
	border-bottom: 1px solid var(--border-soft);
}

.table tbody td {
	padding: 16px;
	border-color: var(--border-soft);
	font-size: .9rem;
	vertical-align: middle;
}

.table tbody tr:hover {
	background: rgba(255,255,255,0.04);
}

/* ===== USER INFO ===== */
.user-name {
	font-weight: 700;
}

.user-email,
.user-mobile {
	color: var(--text-muted);
	font-size: .85rem;
}

/* ===== ACTIONS ===== */
.action-cell {
	display: flex;
	gap: 12px;
	flex-wrap: wrap;
}

.btn-block {
	background: rgba(239,68,68,.15);
	color: var(--danger);
	border: 1px solid var(--danger);
	padding: .45rem 1rem;
	font-size: .75rem;
	font-weight: 700;
	border-radius: 8px;
	text-decoration: none;
}

.btn-block:hover {
	background: var(--danger);
	color: #fff;
}

.btn-unblock {
	background: rgba(34,197,94,.15);
	color: var(--success);
	border: 1px solid var(--success);
	padding: .45rem 1rem;
	font-size: .75rem;
	font-weight: 700;
	border-radius: 8px;
	text-decoration: none;
}

.btn-unblock:hover {
	background: var(--success);
	color: #022c22;
}

/* ===== EMPTY STATE ===== */
.empty-state {
	text-align: center;
	padding: 90px 30px;
	background: var(--bg-card);
	border-radius: 16px;
	border: 1px solid var(--border-soft);
	box-shadow: 0 25px 60px rgba(0,0,0,.7);
}

.empty-state p {
	color: var(--text-muted);
	font-size: 1rem;
}

/* ===== RESPONSIVE ===== */
@media (max-width:768px) {
	.admin-header h1 {
		font-size: 1.5rem;
	}
	.action-cell {
		flex-direction: column;
	}
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
	<div class="container-fluid">
		<a class="navbar-brand" href="/">🎬 BookMyTicket</a>
		<div class="collapse navbar-collapse">
			<ul class="navbar-nav ms-auto">
				<li class="nav-item"><a class="nav-link" href="/">Home</a></li>
				<li class="nav-item"><a class="nav-link" href="/manage-users">Users</a></li>
				<li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
			</ul>
		</div>
	</div>
</nav>

<div class="admin-container">

	<div class="admin-header">
		<h1>👥 Manage Users</h1>
		<a href="/" class="back-link">← Home</a>
	</div>

	<!-- USERS TABLE -->
	<div th:if="${users != null && users.size() > 0}" class="table-wrapper">
		<table class="table">
			<thead>
				<tr>
					<th>Name</th>
					<th>Email</th>
					<th>Mobile</th>
					<th>Action</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="user:${users}">
					<td class="user-name" th:text="${user.name}"></td>
					<td class="user-email" th:text="${user.email}"></td>
					<td class="user-mobile" th:text="${user.mobile}"></td>
					<td>
						<div class="action-cell">
							<a th:if="${!user.blocked}"
							   th:href="'/block/'+${user.id}"
							   class="btn-block">Block</a>

							<a th:if="${user.blocked}"
							   th:href="'/un-block/'+${user.id}"
							   class="btn-unblock">Unblock</a>
						</div>
					</td>
				</tr>
			</tbody>
		</table>
	</div>

	<!-- EMPTY -->
	<div th:if="${users == null || users.size() == 0}" class="empty-state">
		<p>No users found</p>
	</div>

</div>

</body>
</html>
