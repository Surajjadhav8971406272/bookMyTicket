<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookMyTicket</title>

<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap" rel="stylesheet">

<style>
:root {
	--bg-main-1: #2b2f3a;
	--bg-main-2: #1c1f26;
	--bg-card-1: #262a33;
	--bg-card-2: #1f232b;
	--border-soft: #343842;
	--text-main: #e5e7eb;
	--text-muted: #9ca3af;
	--accent: #6496ff;
	--accent-pink: #ff4081;
}

/* ===== GLOBAL (FINAL MATCH) ===== */
body {
	font-family: "Poppins", sans-serif;
	background: linear-gradient(180deg, var(--bg-main-1), var(--bg-main-2));
	color: var(--text-main);
	min-height: 100vh;
}

/* ===== NAVBAR (MATCHED) ===== */
.navbar {
	background: rgba(28, 31, 38, 0.96) !important;
	backdrop-filter: blur(12px);
	border-bottom: 1px solid var(--border-soft);
	padding: .8rem 2rem;
}

.navbar-brand {
	font-weight: 900;
	font-size: 1.45rem;
	background: linear-gradient(135deg, var(--accent), var(--accent-pink));
	-webkit-background-clip: text;
	-webkit-text-fill-color: transparent;
}

/* ===== HERO (COMPACT) ===== */
.hero {
	padding: 55px 20px 35px;
	text-align: center;
	background: transparent;
}

.hero h1 {
	font-size: 2.4rem;
	font-weight: 900;
	background: linear-gradient(135deg, var(--accent), var(--accent-pink));
	-webkit-background-clip: text;
	-webkit-text-fill-color: transparent;
}

.hero p {
	color: var(--text-muted);
	font-size: 1rem;
	margin-top: 6px;
}

/* ===== MOVIES SECTION ===== */
#movies {
	padding: 35px 0 70px;
}

#movies h2 {
	text-align: center;
	font-weight: 900;
	margin-bottom: 35px;
}

/* ===== ADMIN-STYLE MOVIE CARD (MATCHED) ===== */
.movie-card {
	background: linear-gradient(180deg, var(--bg-card-1), var(--bg-card-2));
	border: 1px solid var(--border-soft);
	border-radius: 18px;
	overflow: hidden;
	box-shadow: 0 25px 60px rgba(0,0,0,.7);
	transition: all .35s ease;
	height: 100%;
	display: flex;
	flex-direction: column;
}

.movie-card:hover {
	transform: translateY(-8px);
	border-color: var(--accent);
	box-shadow: 0 35px 85px rgba(0,0,0,.9);
}

.movie-card img {
	height: 250px;
	object-fit: cover;
	border-bottom: 1px solid var(--border-soft);
}

.movie-card .card-body {
	padding: 20px;
	display: flex;
	flex-direction: column;
}

.movie-card h5 {
	font-weight: 800;
	font-size: 1.05rem;
	margin-bottom: 6px;
}

.movie-meta {
	font-size: .85rem;
	color: var(--text-muted);
	margin-bottom: 18px;
}

/* ===== BUTTON ===== */
.movie-card .btn {
	margin-top: auto;
	padding: 10px;
	border-radius: 12px;
	font-weight: 700;
	font-size: .85rem;
	border: none;
	background: linear-gradient(135deg, var(--accent), var(--accent-pink));
	box-shadow: 0 12px 30px rgba(100,150,255,.45);
}

.movie-card .btn:hover {
	transform: translateY(-2px);
	box-shadow: 0 20px 45px rgba(100,150,255,.6);
}

/* ===== FOOTER ===== */
footer {
	border-top: 1px solid var(--border-soft);
	text-align: center;
	padding: 22px;
	color: var(--text-muted);
	margin-top: 60px;
}

/* ===== RESPONSIVE ===== */
@media (max-width:768px) {
	.hero h1 { font-size: 2rem; }
	.movie-card img { height: 220px; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
	<a class="navbar-brand" href="/">🎬 BookMyTicket</a>

	<div class="collapse navbar-collapse justify-content-end">
		<div th:if="${session.user == null}">
			<a href="/login" class="btn btn-outline-light me-2">Login</a>
			<a href="/register" class="btn btn-primary">Register</a>
		</div>

		<div th:if="${session.user != null}" class="d-flex align-items-center">
			<span class="me-3 fw-semibold"
				  th:text="'Hello, ' + ${session.user.name}"></span>

			<a th:if="${session.user.role=='USER'}"
			   href="/bookings"
			   class="btn btn-outline-light me-2">My Bookings</a>

			<a th:if="${session.user.role=='ADMIN'}"
			   href="/manage-movies"
			   class="btn btn-danger me-2">Manage Movies</a>

			<a th:if="${session.user.role=='ADMIN'}"
			   href="/manage-theaters"
			   class="btn btn-danger me-2">Manage Theaters</a>

			<a th:if="${session.user.role=='ADMIN'}"
			   href="/manage-users"
			   class="btn btn-danger me-2">Manage Users</a>

			<a href="/logout" class="btn btn-primary">Logout</a>
		</div>
	</div>
</nav>

<!-- HERO -->
<section class="hero">
	<h1>Book Your Favorite Movies</h1>
	<p>Fast • Secure • Premium Experience</p>
</section>

<!-- MOVIES -->
<section class="container" id="movies" th:if="${!movies.isEmpty()}">
	<h2>Now Showing</h2>

	<div class="row g-4">
		<div class="col-xl-3 col-lg-4 col-md-4 col-sm-6"
		     th:each="movie:${movies}">
			<div class="movie-card">
				<img th:src="${movie.imageLink}">
				<div class="card-body">
					<h5 th:text="${movie.name}"></h5>
					<div class="movie-meta">
						<span th:text="${movie.genre}"></span> •
						<span th:text="${movie.duration}"></span> hrs
					</div>
					<a th:href="'/book/movie/'+${movie.id}"
					   class="btn btn-primary w-100">Book Now</a>
				</div>
			</div>
		</div>
	</div>
</section>

<footer>
	<p>© 2025 BookMyTicket — All Rights Reserved</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
