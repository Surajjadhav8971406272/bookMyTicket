<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Movies | BookMyTicket</title>

<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
	--bg-main: #1c1f26;
	--bg-card: #262a33;
	--border-soft: #343842;
	--text-main: #ffffff;
	--text-muted: #c2c6cf;
	--accent: #e53935;
}

/* ===== GLOBAL ===== */
body {
	font-family: "Poppins", sans-serif;
	background: linear-gradient(180deg, #2b2f3a, #1c1f26);
	color: var(--text-main);
	min-height: 100vh;
}

/* ===== NAVBAR ===== */
.navbar {
	background: rgba(28,31,38,0.95) !important;
	border-bottom: 1px solid var(--border-soft);
	padding: 1rem 2rem;
}

.navbar-brand {
	font-weight: 800;
	font-size: 1.5rem;
	color: var(--accent) !important;
}

.nav-link {
	color: var(--text-muted) !important;
	font-weight: 500;
}

.nav-link:hover {
	color: var(--text-main) !important;
}

.btn-logout {
	background: var(--accent);
	color: #fff;
	border: none;
	border-radius: 8px;
	padding: .45rem 1.2rem;
	font-weight: 600;
}

/* ===== CONTAINER ===== */
.admin-container {
	max-width: 1400px;
	margin: auto;
	padding: 50px 20px;
}

/* ===== HEADER ===== */
.admin-header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 35px;
	flex-wrap: wrap;
	gap: 20px;
}

.admin-header h1 {
	font-size: 2rem;
	font-weight: 800;
}

.add-btn {
	background: var(--accent);
	color: #fff;
	padding: .7rem 1.8rem;
	border-radius: 10px;
	font-weight: 700;
	text-decoration: none;
	box-shadow: 0 10px 25px rgba(229,57,53,0.45);
}

/* ===== MOVIE GRID ===== */
.movie-grid {
	display: grid;
	grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
	gap: 25px;
}

/* ===== MOVIE CARD ===== */
.movie-card {
	background: var(--bg-card);
	border-radius: 16px;
	overflow: hidden;
	border: 1px solid var(--border-soft);
	box-shadow: 0 15px 35px rgba(0,0,0,0.6);
	transition: 0.3s ease;
}

.movie-card:hover {
	transform: translateY(-6px);
	box-shadow: 0 25px 55px rgba(0,0,0,0.8);
}

.movie-card img {
	width: 100%;
	height: 280px;
	object-fit: cover;
}

/* ===== CARD BODY ===== */
.movie-info {
	padding: 18px;
}

.movie-info h5 {
	font-weight: 700;
	margin-bottom: 14px;
}

/* ===== KEY VALUE ROWS (TABLE-LIKE) ===== */
.movie-details {
	display: grid;
	grid-template-columns: 90px 1fr;
	row-gap: 8px;
	column-gap: 10px;
	font-size: 0.85rem;
	margin-bottom: 16px;
}

.movie-details .label {
	color: var(--text-muted);
	font-weight: 600;
	text-align: left;
}

.movie-details .value {
	color: var(--text-main);
	font-weight: 500;
}

/* ===== ACTION ===== */
.btn-delete {
	width: 100%;
	background: var(--accent);
	color: #fff;
	border: none;
	border-radius: 8px;
	padding: .5rem;
	font-weight: 600;
}

/* ===== EMPTY ===== */
.empty-state {
	text-align: center;
	padding: 80px 40px;
	background: var(--bg-card);
	border-radius: 16px;
	border: 1px solid var(--border-soft);
}

.empty-state p {
	color: var(--text-muted);
}

/* ===== RESPONSIVE ===== */
@media (max-width:768px) {
	.movie-card img {
		height: 230px;
	}
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
	<div class="container-fluid">
		<a class="navbar-brand" href="/">🎬 BookMyTicket</a>

		<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
			<span class="navbar-toggler-icon"></span>
		</button>

		<div class="collapse navbar-collapse" id="navbarNav">
			<ul class="navbar-nav ms-auto align-items-center gap-2">
				<li class="nav-item"><a class="nav-link" href="/admin-dashboard">Dashboard</a></li>
				<li class="nav-item"><a class="nav-link" href="/manage-movies">Movies</a></li>
				<li class="nav-item"><a class="nav-link" href="/manage-theaters">Theaters</a></li>
				<li class="nav-item"><a class="nav-link" href="/manage-users">Users</a></li>
				<li class="nav-item"><button class="btn-logout" onclick="location.href='/logout'">Logout</button></li>
			</ul>
		</div>
	</div>
</nav>

<!-- MAIN -->
<div class="admin-container">

	<div class="admin-header">
		<h1>🎬 Movies Management</h1>
		<a href="/add-movie" class="add-btn">+ Add Movie</a>
	</div>

	<!-- MOVIES -->
	<div th:if="${!movies.isEmpty()}" class="movie-grid">
		<div class="movie-card" th:each="movie:${movies}">
			<img th:src="${movie.imageLink}">
			<div class="movie-info">
				<h5 th:text="${movie.name}"></h5>

				<div class="movie-details">
					<div class="label">Genre</div>
					<div class="value" th:text="${movie.genre}"></div>

					<div class="label">Duration</div>
					<div class="value"><span th:text="${movie.duration}"></span> hrs</div>

					<div class="label">Language</div>
					<div class="value" th:text="${movie.languages}"></div>

					<div class="label">Release</div>
					<div class="value" th:text="${movie.releaseDate}"></div>
				</div>

				<a th:href="'/delete-movie/'+${movie.id}" class="btn-delete">Delete Movie</a>
			</div>
		</div>
	</div>

	<!-- EMPTY -->
	<div th:if="${movies.isEmpty()}" class="empty-state">
		<h2>🎞️ No Movies Yet</h2>
		<p>Add your first movie to start ticket sales</p>
		<a href="/add-movie" class="add-btn">+ Add Movie</a>
	</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
