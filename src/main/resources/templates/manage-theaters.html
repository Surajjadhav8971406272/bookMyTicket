<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Theaters | BookMyTicket</title>

<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
	--bg-main: #1c1f26;
	--bg-card: #262a33;
	--border-soft: #343842;
	--text-main: #ffffff;
	--text-muted: #c2c6cf;
	--accent: #e53935;
	--danger: #ff4d6d;
}

/* ===== GLOBAL ===== */
body {
	font-family: "Poppins", sans-serif;
	background: linear-gradient(180deg, #2b2f3a, #1c1f26);
	color: var(--text-main);
	min-height: 100vh;
}

/* ===== NAVBAR ===== */
.navbar {
	background: rgba(28,31,38,0.95) !important;
	border-bottom: 1px solid var(--border-soft);
	padding: 1rem 2rem;
}

.navbar-brand {
	font-weight: 800;
	font-size: 1.5rem;
	color: var(--accent) !important;
}

.nav-link {
	color: var(--text-muted) !important;
	font-weight: 500;
}

.nav-link:hover {
	color: var(--text-main) !important;
}

/* ===== CONTAINER ===== */
.admin-container {
	max-width: 1400px;
	margin: auto;
	padding: 50px 20px;
}

/* ===== HEADER ===== */
.admin-header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 35px;
	flex-wrap: wrap;
	gap: 20px;
}

.admin-header h1 {
	font-size: 2rem;
	font-weight: 800;
}

.add-btn {
	background: var(--accent);
	color: #fff;
	padding: .7rem 1.8rem;
	border-radius: 10px;
	font-weight: 700;
	text-decoration: none;
	box-shadow: 0 10px 25px rgba(229,57,53,0.45);
}

/* ===== GRID ===== */
.theaters-grid {
	display: grid;
	grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
	gap: 25px;
}

/* ===== CARD ===== */
.theater-card {
	background: var(--bg-card);
	border-radius: 16px;
	overflow: hidden;
	border: 1px solid var(--border-soft);
	box-shadow: 0 15px 35px rgba(0,0,0,0.6);
	transition: 0.3s ease;
}

.theater-card:hover {
	transform: translateY(-6px);
	box-shadow: 0 25px 55px rgba(0,0,0,0.8);
}

.theater-image {
	width: 100%;
	height: 200px;
	object-fit: cover;
}

/* ===== CARD BODY ===== */
.theater-content {
	padding: 18px;
}

.theater-name {
	font-size: 1.2rem;
	font-weight: 700;
	margin-bottom: 14px;
}

/* ===== KEY VALUE DETAILS ===== */
.theater-details {
	display: grid;
	grid-template-columns: 90px 1fr;
	row-gap: 8px;
	column-gap: 10px;
	font-size: 0.85rem;
	margin-bottom: 16px;
}

.theater-details .label {
	color: var(--text-muted);
	font-weight: 600;
}

.theater-details .value {
	color: var(--text-main);
	font-weight: 500;
}

/* ===== ACTIONS ===== */
.card-actions {
	display: grid;
	grid-template-columns: repeat(2, 1fr);
	gap: 8px;
}

.btn-action {
	padding: .5rem;
	font-size: .75rem;
	font-weight: 700;
	border-radius: 8px;
	text-decoration: none;
	text-align: center;
	transition: .2s ease;
}

.btn-edit {
	background: #2563eb;
	color: white;
}

.btn-location {
	background: #475569;
	color: white;
}

.btn-screens {
	background: #f59e0b;
	color: #111827;
}

.btn-delete {
	background: transparent;
	color: var(--danger);
	border: 1px solid var(--danger);
}

.btn-delete:hover {
	background: var(--danger);
	color: white;
}

/* ===== EMPTY ===== */
.empty-state {
	text-align: center;
	padding: 80px 40px;
	background: var(--bg-card);
	border-radius: 16px;
	border: 1px solid var(--border-soft);
}

.empty-state p {
	color: var(--text-muted);
}

/* ===== RESPONSIVE ===== */
@media (max-width:768px) {
	.card-actions {
		grid-template-columns: 1fr;
	}
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
	<div class="container-fluid">
		<a class="navbar-brand" href="/">🎬 BookMyTicket</a>
		<div class="collapse navbar-collapse">
			<ul class="navbar-nav ms-auto">
				<li class="nav-item"><a class="nav-link" href="/manage-users">Users</a></li>
				<li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
			</ul>
		</div>
	</div>
</nav>

<div class="admin-container">

	<div class="admin-header">
		<h1>🏛️ Manage Theaters</h1>
		<a href="/add-theater" class="add-btn">+ Add Theater</a>
	</div>

	<!-- EMPTY -->
	<div th:if="${theaters.isEmpty()}" class="empty-state">
		<h2>No Theaters Found</h2>
		<p>Add your first theater to start managing screens & shows.</p>
		<a href="/add-theater" class="add-btn">+ Add First Theater</a>
	</div>

	<!-- GRID -->
	<div th:if="${!theaters.isEmpty()}" class="theaters-grid">
		<div th:each="theater:${theaters}" class="theater-card">

			<img th:src="${theater.imageLocation}" class="theater-image">

			<div class="theater-content">
				<div class="theater-name" th:text="${theater.name}"></div>

				<div class="theater-details">
					<div class="label">Address</div>
					<div class="value" th:text="${theater.address}"></div>

					<div class="label">Screens</div>
					<div class="value" th:text="${theater.screenCount}"></div>
				</div>

				<div class="card-actions">
					<a th:href="'/edit-theater/'+${theater.id}" class="btn-action btn-edit">Edit</a>
					<a th:href="${theater.locationLink}" target="_blank" class="btn-action btn-location">Location</a>
					<a th:href="'/manage-screens/'+${theater.id}" class="btn-action btn-screens">Screens</a>
					<a th:href="'/delete-theater/'+${theater.id}"
					   onclick="return confirm('Delete this theater?');"
					   class="btn-action btn-delete">Delete</a>
				</div>

			</div>
		</div>
	</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
