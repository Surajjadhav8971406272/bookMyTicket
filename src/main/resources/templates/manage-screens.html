<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Screens | BookMyTicket</title>

<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
	--bg-main: #1c1f26;
	--bg-card: #262a33;
	--border-soft: #343842;
	--text-main: #ffffff;
	--text-muted: #c2c6cf;
	--accent: #e53935;
	--danger: #ef4444;
}

/* ===== GLOBAL ===== */
body {
	font-family: "Poppins", sans-serif;
	background: linear-gradient(180deg, #2b2f3a, #1c1f26);
	min-height: 100vh;
	color: var(--text-main);
}

/* ===== NAVBAR ===== */
.navbar {
	background: #1c1f26;
	border-bottom: 1px solid var(--border-soft);
	padding: 1rem 2rem;
}

.navbar-brand {
	font-weight: 800;
	font-size: 1.4rem;
	color: var(--accent);
}

.nav-link {
	color: var(--text-muted) !important;
	font-weight: 600;
}

.nav-link:hover {
	color: var(--accent) !important;
}

/* ===== CONTAINER ===== */
.admin-container {
	max-width: 1200px;
	margin: auto;
	padding: 45px 20px;
}

/* ===== HEADER ===== */
.admin-header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	flex-wrap: wrap;
	gap: 20px;
	margin-bottom: 30px;
}

.admin-header h1 {
	font-weight: 800;
	font-size: 1.9rem;
}

.add-btn {
	background: var(--accent);
	color: #fff;
	font-weight: 700;
	padding: .65rem 1.6rem;
	border-radius: 10px;
	text-decoration: none;
}

.add-btn:hover {
	background: #f44336;
	color: #fff;
}

/* ===== TABLE ===== */
.table-wrapper {
	background: var(--bg-card);
	border-radius: 14px;
	border: 1px solid var(--border-soft);
	box-shadow: 0 20px 45px rgba(0,0,0,.6);
	overflow: hidden;
}

.table {
	margin-bottom: 0;
	color: var(--text-main);
}

.table thead th {
	background: #1f232b;
	color: var(--text-muted);
	font-weight: 700;
	font-size: .8rem;
	text-transform: uppercase;
	letter-spacing: .4px;
	border-bottom: 1px solid var(--border-soft);
	padding: 14px;
}

.table tbody td {
	padding: 14px;
	border-color: var(--border-soft);
	font-weight: 500;
}

.table tbody tr:hover {
	background: rgba(255,255,255,0.03);
}

.screen-name {
	font-weight: 600;
}

.screen-type {
	background: rgba(229,57,53,.15);
	color: var(--accent);
	padding: 4px 10px;
	border-radius: 999px;
	font-size: .75rem;
	font-weight: 700;
}

/* ===== ACTIONS ===== */
.action-cell {
	display: flex;
	gap: 12px;
	flex-wrap: wrap;
	align-items: center;
}


.btn-edit,
.btn-manage,
.btn-delete {
	padding: .5rem 1rem;
	border-radius: 9px;
	font-size: .78rem;
	font-weight: 700;
	min-width: 78px;
	text-align: center;
}


.btn-edit {
	background: #3b82f6;
	color: white;
}

.btn-manage {
	background: #f59e0b;
	color: #111;
}

.btn-delete {
	background: rgba(239,68,68,.15);
	color: var(--danger);
	border: 1px solid var(--danger);
}

.btn-edit:hover { background: #2563eb; }
.btn-manage:hover { background: #d97706; }
.btn-delete:hover {
	background: var(--danger);
	color: white;
}

/* ===== EMPTY STATE ===== */
.empty-state {
	text-align: center;
	padding: 70px 30px;
	background: var(--bg-card);
	border-radius: 16px;
	border: 1px solid var(--border-soft);
	box-shadow: 0 20px 45px rgba(0,0,0,.6);
}

.empty-state h2 {
	font-weight: 800;
	margin-bottom: 10px;
}

.empty-state p {
	color: var(--text-muted);
	margin-bottom: 25px;
}

@media (max-width:768px) {
	.action-cell {
		flex-direction: column;
		gap: 8px;
	}
	.btn-edit,
	.btn-manage,
	.btn-delete {
		width: 100%;
	}
}


</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
	<div class="container-fluid">
		<a class="navbar-brand" href="/">🎬 BookMyTicket</a>
		<div class="collapse navbar-collapse">
			<ul class="navbar-nav ms-auto">
				<li class="nav-item"><a class="nav-link" href="/">Home</a></li>
				<li class="nav-item"><a class="nav-link" href="/manage-users">Users</a></li>
			</ul>
		</div>
	</div>
</nav>

<div class="admin-container">

	<div class="admin-header">
		<h1>🎬 Manage Screens</h1>
		<a th:href="'/add-screen/'+${id}" class="add-btn">+ Add Screen</a>
	</div>

	<!-- EMPTY -->
	<div th:if="${screens.isEmpty()}" class="empty-state">
		<h2>No Screens Found</h2>
		<p>Add your first screen to manage seats and shows.</p>
		<a th:href="'/add-screen/'+${id}" class="add-btn">+ Add Screen</a>
	</div>

	<!-- TABLE -->
	<div th:if="${!screens.isEmpty()}" class="table-wrapper">
		<table class="table">
			<thead>
				<tr>
					<th>Name</th>
					<th>Type</th>
					<th>Actions</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="screen:${screens}">
					<td class="screen-name" th:text="${screen.name}"></td>
					<td><span class="screen-type" th:text="${screen.type}"></span></td>
					<td>
						<div class="action-cell">
							<a th:href="'/edit-screen/'+${screen.id}" class="btn-edit">Edit</a>
							<a th:href="'/manage-seats/'+${screen.id}" class="btn-manage">Seats</a>
							<a th:href="'/manage-shows/'+${screen.id}" class="btn-manage">Shows</a>
							<a th:href="'/delete-screen/'+${screen.id}" class="btn-delete"
							   onclick="return confirm('Delete this screen?');">Delete</a>
						</div>
					</td>
				</tr>
			</tbody>
		</table>
	</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
