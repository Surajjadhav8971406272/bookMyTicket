<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Theater & Show | BookMyTicket</title>

<link rel="icon" type="image/svg+xml" href="/favicon.svg">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap" rel="stylesheet">

<style>
:root {
	--bg-main-1: #2b2f3a;
	--bg-main-2: #1c1f26;
	--bg-card-1: #262a33;
	--bg-card-2: #1f232b;
	--border-soft: #343842;
	--text-main: #e5e7eb;
	--text-muted: #9ca3af;
	--accent: #e74c3c;
}

/* ===== GLOBAL (MATCHED) ===== */
body {
	font-family: "Poppins", sans-serif;
	background: linear-gradient(180deg, var(--bg-main-1), var(--bg-main-2));
	min-height: 100vh;
	color: var(--text-main);
	padding: 30px 15px;
}

/* ===== PAGE TITLE ===== */
.page-title {
	font-weight: 900;
	margin-bottom: 35px;
	text-align: center;
}

/* ===== THEATER CARD (ADMIN STYLE) ===== */
.theater-card {
	background: linear-gradient(180deg, var(--bg-card-1), var(--bg-card-2));
	border: 1px solid var(--border-soft);
	border-radius: 18px;
	padding: 25px;
	margin-bottom: 25px;
	box-shadow: 0 25px 60px rgba(0,0,0,.7);
	animation: fadeInUp .5s ease;
}

/* ===== THEATER NAME ===== */
.theater-name {
	font-size: 1.5rem;
	font-weight: 900;
	margin-bottom: 15px;
	display: flex;
	align-items: center;
	gap: 10px;
}

/* ===== SHOW TIME BUTTONS ===== */
.show-time {
	display: inline-flex;
	align-items: center;
	justify-content: center;
	margin: 6px 8px 6px 0;
	padding: 10px 18px;
	border-radius: 12px;
	font-weight: 700;
	font-size: .9rem;
	text-decoration: none;
	color: var(--accent);
	border: 2px solid var(--accent);
	transition: all .25s ease;
	background: transparent;
}

.show-time:hover {
	background: var(--accent);
	color: #fff;
	transform: translateY(-2px);
	box-shadow: 0 12px 35px rgba(231,76,60,.55);
}

/* ===== NO SHOW TEXT ===== */
.no-shows {
	color: var(--text-muted);
	font-style: italic;
	font-weight: 500;
}

/* ===== ANIMATION ===== */
@keyframes fadeInUp {
	from { opacity:0; transform: translateY(20px); }
	to { opacity:1; transform: translateY(0); }
}

/* ===== RESPONSIVE ===== */
@media (max-width:768px) {
	.theater-name {
		font-size: 1.3rem;
	}
	.show-time {
		padding: 8px 14px;
		font-size: .85rem;
	}
}
</style>
</head>

<body>

<div class="container">

	<h2 class="page-title">🎭 Select Theater & Show</h2>

	<!-- THEATERS -->
	<div th:each="theater : ${theaters.keySet()}">

		<div class="theater-card">

			<div class="theater-name">
				🏛️ <span th:text="${theater.name}"></span>
			</div>

			<div>
				<span class="text-muted me-2">Shows:</span>

				<span th:if="${theaters.get(theater).isEmpty()}"
				      class="no-shows">
					No shows available
				</span>

				<a th:each="show : ${theaters.get(theater)}"
				   th:href="'/show-seats/' + ${show.id}"
				   class="show-time"
				   th:text="${show.startTime}">
				</a>
			</div>

		</div>

	</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
