<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | BookMyTicket</title>

<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap"
	rel="stylesheet">

<style>
:root {
	--bg-main: #1c1f26;     /* light dark background */
	--bg-card: #262a33;     /* card background */
	--border-soft: #343842;
	--text-main: #ffffff;
	--text-muted: #c2c6cf;
	--accent: #e53935;     /* BookMyShow red */
}

/* ===== GLOBAL ===== */
body {
	font-family: "Poppins", sans-serif;
	background: linear-gradient(180deg, #2b2f3a, #1c1f26);
	min-height: 100vh;
	color: var(--text-main);
	display: flex;
	align-items: center;
	justify-content: center;
	padding: 20px;
}

/* ===== LOGIN CARD ===== */
.login-box {
	width: 100%;
	max-width: 420px;
	padding: 42px;
	background: var(--bg-card);
	border-radius: 16px;
	border: 1px solid var(--border-soft);
	box-shadow: 0 20px 45px rgba(0, 0, 0, 0.55);
	text-align: center;
	animation: fadeInUp 0.4s ease;
}

/* ===== TITLE ===== */
.login-box a {
	color: #ff4d4d;              /* bright red */
	font-weight: 600;
	text-decoration: none;
	display: inline-block;
}

.login-box a:hover {
	color: #ff6b6b;
	text-decoration: underline;
}

/* Make muted text still visible */
.login-box .text-muted {
	color: #cfd3dc !important;
}

/* ===== INPUTS ===== */
.form-control {
	background: #1f232b;
	border: 1px solid var(--border-soft);
	border-radius: 10px;
	padding: 12px 14px;
	color: var(--text-main);
	font-weight: 500;
}

.form-control::placeholder {
	color: #9aa0ab;
}

.form-control:focus {
	background: #1f232b;
	border-color: var(--accent);
	box-shadow: none;
	color: var(--text-main);
}

/* ===== CHECKBOX ===== */
.form-check-label {
	color: var(--text-muted);
	font-size: 0.85rem;
}

.form-check-input {
	accent-color: var(--accent);
}

/* ===== BUTTON ===== */
.btn-primary {
	width: 100%;
	padding: 12px;
	border-radius: 10px;
	border: none;
	font-weight: 700;
	font-size: 0.95rem;
	background: var(--accent);
	box-shadow: 0 10px 25px rgba(229, 57, 53, 0.4);
	transition: all 0.25s ease;
}

.btn-primary:hover {
	background: #f44336;
	transform: translateY(-1px);
}

/* ===== LINKS ===== */
a {
	color: var(--accent);
	font-weight: 600;
	text-decoration: none;
}

a:hover {
	text-decoration: underline;
}

/* ===== TOASTS ===== */
.toastify-container {
	position: fixed;
	top: 20px;
	right: 20px;
	z-index: 9999;
}

.toastify {
	min-width: 300px;
	max-width: 420px;
	border-radius: 10px;
	padding: 14px 18px;
	color: white;
	font-weight: 600;
	display: flex;
	align-items: center;
	gap: 12px;
	box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
	animation: toastSlideIn 0.35s ease forwards;
}

.toastify.success { background: #2ecc71; }
.toastify.error { background: #e53935; }

.toastify span { flex: 1; }

.toastify-close {
	width: 26px;
	height: 26px;
	border-radius: 50%;
	background: rgba(255, 255, 255, 0.25);
	border: none;
	color: white;
	font-size: 1.1rem;
	cursor: pointer;
	display: flex;
	align-items: center;
	justify-content: center;
}

/* ===== ANIMATIONS ===== */
@keyframes toastSlideIn {
	from { opacity: 0; transform: translateX(250px); }
	to { opacity: 1; transform: translateX(0); }
}

@keyframes toastSlideOut {
	from { opacity: 1; transform: translateX(0); }
	to { opacity: 0; transform: translateX(250px); }
}

@keyframes fadeInUp {
	from { opacity: 0; transform: translateY(20px); }
	to { opacity: 1; transform: translateY(0); }
}

/* ===== MOBILE ===== */
@media (max-width: 480px) {
	.login-box {
		padding: 30px;
	}
}

</style>
</head>

<body>

	<!-- TOASTS -->
	<div class="toastify-container">
		<div th:if="${pass}" class="toastify success">
			<span th:text="${pass}"></span>
		</div>
		<div th:if="${fail}" class="toastify error">
			<span th:text="${fail}"></span>
		</div>
	</div>

	<!-- LOGIN CARD -->
	<div class="login-box">
		<h3>Welcome Back</h3>
		<p>Sign in to continue booking</p>

		<form action="/login" method="post">
			<div class="mb-3">
				<input type="email" name="email" class="form-control"
					placeholder="📧 Email address" required>
			</div>

			<div class="mb-3">
				<input type="password" name="password" class="form-control"
					placeholder="🔒 Password" required>
			</div>

			<div class="mb-3 form-check text-start">
				<input type="checkbox" class="form-check-input" id="remember">
				<label class="form-check-label" for="remember">Remember me</label>
			</div>

			<button class="btn btn-primary">Sign In</button>
		</form>

		<div class="mt-4">
			<a href="/forgot-password">Forgot Password?</a><br> <span
				class="text-muted">New here?</span> <a href="/register">Create
				account</a>
		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

	<script>
document.addEventListener("DOMContentLoaded", () => {
	document.querySelectorAll('.toastify').forEach(t => {
		const btn = document.createElement('button');
		btn.className = 'toastify-close';
		btn.innerHTML = '×';
		t.appendChild(btn);

		btn.onclick = () => {
			t.style.animation = 'toastSlideOut 0.3s ease forwards';
			setTimeout(() => t.remove(), 300);
		};

		setTimeout(() => {
			if (document.body.contains(t)) {
				t.style.animation = 'toastSlideOut 0.3s ease forwards';
				setTimeout(() => t.remove(), 300);
			}
		}, 3500);
	});
});
</script>

</body>
</html>
