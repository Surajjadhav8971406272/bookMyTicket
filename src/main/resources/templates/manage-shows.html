<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Manage Shows | BookMyTicket</title>

<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
	--bg-main: #1c1f26;
	--bg-card: #262a33;
	--border-soft: #343842;
	--text-main: #ffffff;
	--text-muted: #c2c6cf;
	--accent: #e53935;
	--danger: #ef4444;
}

/* ===== GLOBAL ===== */
body {
	font-family: "Poppins", sans-serif;
	background: linear-gradient(180deg, #2b2f3a, #1c1f26);
	min-height: 100vh;
	color: var(--text-main);
}

/* ===== CONTAINER ===== */
.admin-container {
	max-width: 1200px;
	margin: auto;
	padding: 50px 20px;
}

/* ===== HEADER ===== */
.admin-header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	flex-wrap: wrap;
	gap: 20px;
	margin-bottom: 30px;
}

.admin-header h1 {
	font-weight: 800;
	font-size: 1.9rem;
}

.add-btn {
	background: var(--accent);
	color: #fff;
	font-weight: 700;
	padding: .65rem 1.6rem;
	border-radius: 10px;
	text-decoration: none;
}

.add-btn:hover {
	background: #f44336;
	color: #fff;
}

/* ===== TABLE ===== */
.table-wrapper {
	background: var(--bg-card);
	border-radius: 14px;
	border: 1px solid var(--border-soft);
	box-shadow: 0 20px 45px rgba(0,0,0,.6);
	overflow: hidden;
}

.table {
	margin-bottom: 0;
	color: var(--text-main);
}

.table thead th {
	background: #1f232b;
	color: var(--text-muted);
	font-weight: 700;
	font-size: .8rem;
	text-transform: uppercase;
	letter-spacing: .4px;
	border-bottom: 1px solid var(--border-soft);
	padding: 14px;
}

.table tbody td {
	padding: 14px;
	border-color: var(--border-soft);
	font-weight: 500;
}

.table tbody tr:hover {
	background: rgba(255,255,255,0.03);
}

/* ===== ACTION BUTTON ===== */
.btn-delete {
	background: rgba(239,68,68,.15);
	color: var(--danger);
	border: 1px solid var(--danger);
	padding: .4rem .9rem;
	border-radius: 8px;
	font-size: .75rem;
	font-weight: 700;
	text-decoration: none;
}

.btn-delete:hover {
	background: var(--danger);
	color: #fff;
}

/* ===== EMPTY STATE ===== */
.empty-state {
	text-align: center;
	padding: 80px 30px;
	background: var(--bg-card);
	border-radius: 16px;
	border: 1px solid var(--border-soft);
	box-shadow: 0 20px 45px rgba(0,0,0,.6);
}

.empty-state h3 {
	font-weight: 800;
	margin-bottom: 10px;
}

.empty-state p {
	color: var(--text-muted);
	margin-bottom: 25px;
}

/* ===== RESPONSIVE ===== */
@media (max-width:768px) {
	.admin-header {
		flex-direction: column;
		align-items: flex-start;
	}
	.table-wrapper {
		overflow-x: auto;
	}
}
</style>
</head>

<body>

<div class="admin-container">

	<div class="admin-header">
		<h1>🎬 Manage Shows</h1>
		<a th:href="'/add-show/'+${id}" class="add-btn">+ Add Show</a>
	</div>

	<!-- ===== SHOWS EXIST ===== -->
	<div th:if="${!shows.isEmpty()}" class="table-wrapper">
		<table class="table">
			<thead>
				<tr>
					<th>Date</th>
					<th>Start</th>
					<th>End</th>
					<th>Movie</th>
					<th>Price</th>
					<th>Total Seats</th>
					<th>Action</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="show : ${shows}">
					<td th:text="${show.showDate}"></td>
					<td th:text="${show.startTime}"></td>
					<td th:text="${show.endTime}"></td>
					<td th:text="${show.movie.name}"></td>
					<td th:text="${show.ticketPrice}"></td>
					<td th:text="${#lists.size(show.seats)}"></td>
					<td>
						<a th:href="'/delete-show/'+${show.id}"
						   class="btn-delete"
						   onclick="return confirm('Delete this show?');">
						   Delete
						</a>
					</td>
				</tr>
			</tbody>
		</table>
	</div>

	<!-- ===== EMPTY ===== -->
	<div th:if="${shows.isEmpty()}" class="empty-state">
		<h3>No Shows Available</h3>
		<p>Add a show to start ticket booking.</p>
		<a th:href="'/add-show/'+${id}" class="add-btn">+ Add Show</a>
	</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
