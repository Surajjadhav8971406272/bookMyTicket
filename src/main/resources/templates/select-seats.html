<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Select Seats | BookMyTicket</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
	rel="stylesheet">

<style>
:root {
	--bg-main: #1c1f26;
	--bg-card: #262a33;
	--border-soft: #343842;
	--text-main: #ffffff;
	--text-muted: #c2c6cf;
	--accent: #e53935;
	--success: #22c55e;
}

/* ===== GLOBAL ===== */
body {
	font-family: "Poppins", sans-serif;
	background: linear-gradient(180deg, #2b2f3a, #1c1f26);
	min-height: 100vh;
	color: var(--text-main);
}

/* ===== CONTAINER ===== */
.container {
	max-width: 1100px;
	margin-top: 40px;
}

/* ===== SCREEN ===== */
.screen {
	background: linear-gradient(135deg, #e53935, #ff6b6b);
	color: white;
	text-align: center;
	padding: 14px;
	border-radius: 12px;
	font-weight: 800;
	letter-spacing: 2px;
	margin-bottom: 45px;
	box-shadow: 0 12px 30px rgba(229,57,53,.45);
}

/* ===== SEAT ROW ===== */
.row-wrapper {
	display: flex;
	align-items: center;
	margin-bottom: 16px;
}

.row-name {
	width: 55px;
	font-weight: 700;
	color: var(--text-muted);
}

/* ===== SEAT ===== */
.seat {
	width: 38px;
	height: 38px;
	margin: 5px;
	border-radius: 8px;
	display: flex;
	align-items: center;
	justify-content: center;
	font-size: .75rem;
	font-weight: 700;
	cursor: pointer;
	user-select: none;
	transition: .25s ease;
}

/* ===== CATEGORIES ===== */
.STANDARD {
	background: #1f232b;
	border: 1px solid #4b5563;
	color: #e5e7eb;
}

.PREMIUM {
	background: #2a2418;
	border: 1px solid #facc15;
	color: #fde68a;
}

.VIP {
	background: #2b1619;
	border: 1px solid #ef4444;
	color: #fecaca;
}

/* ===== STATES ===== */
.booked {
	background: #3f3f46 !important;
	border: none;
	cursor: not-allowed;
	color: #9ca3af;
}

.selected {
	background: linear-gradient(135deg, #22c55e, #16a34a) !important;
	color: white;
	border: none;
	box-shadow: 0 6px 18px rgba(34,197,94,.45);
	transform: scale(1.05);
}

/* ===== LEGEND ===== */
.legend {
	display: flex;
	gap: 22px;
	justify-content: center;
	margin-top: 35px;
	font-weight: 600;
	color: var(--text-muted);
}

.legend span {
	display: flex;
	align-items: center;
	gap: 8px;
}

.legend-box {
	width: 18px;
	height: 18px;
	border-radius: 5px;
}

/* ===== ACTION BUTTONS ===== */
.btn-secondary {
	background: #3f3f46;
	border: none;
	font-weight: 600;
}

.btn-success {
	background: linear-gradient(135deg, #22c55e, #16a34a);
	border: none;
	font-weight: 700;
	box-shadow: 0 10px 25px rgba(34,197,94,.4);
}

.btn-success:hover {
	transform: translateY(-2px);
}

/* ===== RESPONSIVE ===== */
@media (max-width:768px) {
	.seat {
		width: 34px;
		height: 34px;
	}
}

</style>
</head>

<body>

	<div class="container">

		<div class="screen">🎬 SCREEN THIS SIDE 🎬</div>

		<form action="/confirm-booking" method="post"
			onsubmit="return prepareSeats()">

			<input type="hidden" name="seatIds" id="seatIds"> <input
				type="hidden" name="showId" th:value="${showId}">

			<!-- ROW LOOP -->
			<div th:each="rowEntry : ${seatsByRow}">
				<div class="row-wrapper">

					<!-- Row Name -->
					<div class="row-name" th:text="${rowEntry.key}"></div>

					<!-- Seats -->
					<div class="d-flex flex-wrap">
						<div th:each="showSeat : ${rowEntry.value}" class="seat"
							th:classappend="
					        ${showSeat.seat.category}
					        + (${showSeat.booked} ? ' booked' : '')
					     "
							th:text="${showSeat.seat.seatColumn}" th:data-id="${showSeat.id}"
							onclick="toggleSeat(this)"></div>
					</div>

				</div>
			</div>

			<!-- Legend -->
			<div class="legend">
				<span><div class="legend-box STANDARD"></div>Standard</span> <span><div
						class="legend-box PREMIUM"></div>Premium</span> <span><div
						class="legend-box VIP"></div>VIP</span> <span><div
						class="legend-box" style="background: #ccc"></div>Booked</span> <span><div
						class="legend-box" style="background: #2ecc71"></div>Selected</span>
			</div>

			<!-- Actions -->
			<div class="text-end mt-4">
				<a href="/" class="btn btn-secondary">Back</a>
				<button type="submit" class="btn btn-success ms-2">Proceed</button>
			</div>

		</form>

	</div>

	<script>
function toggleSeat(el) {
	if (el.classList.contains('booked')) return;
	el.classList.toggle('selected');
}

function prepareSeats() {
	const selected = document.querySelectorAll('.seat.selected');

	if (selected.length === 0) {
		alert("Please select at least one seat");
		return false;
	}

	const seatIds = Array.from(selected)
		.map(seat => seat.dataset.id)
		.join(',');

	document.getElementById("seatIds").value = seatIds;
	return true;
}
</script>

</body>

</html>
