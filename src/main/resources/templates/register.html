<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | BookMyTicket</title>

<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
:root {
	--bg-main: #1c1f26;
	--bg-card: #262a33;
	--border-soft: #343842;
	--text-main: #ffffff;
	--text-muted: #c2c6cf;
	--accent: #e53935;
	--accent-soft: #ff6b6b;
	--danger: #ff6a6a;
}

/* ===== GLOBAL ===== */
body {
	font-family: "Poppins", sans-serif;
	background: linear-gradient(180deg, #2b2f3a, #1c1f26);
	min-height: 100vh;
	display: flex;
	align-items: center;
	justify-content: center;
	color: var(--text-main);
	padding: 20px;
}

/* ===== CARD ===== */
.register-box {
	width: 100%;
	max-width: 480px;
	padding: 45px;
	background: var(--bg-card);
	border-radius: 18px;
	border: 1px solid var(--border-soft);
	box-shadow: 0 35px 80px rgba(0,0,0,.7);
	animation: fadeInUp .6s ease;
}

.register-box h3 {
	font-weight: 900;
	font-size: 1.9rem;
	margin-bottom: 25px;
	text-align: center;
	color: #e53935;
}

/* ===== FORM ===== */
.form-label {
	font-weight: 600;
	font-size: .85rem;
	color: var(--text-muted);
}

.form-control {
	background: #1b1e25;
	border: 1.5px solid var(--border-soft);
	border-radius: 12px;
	padding: 12px 16px;
	color: var(--text-main);
	font-weight: 600;
	transition: .25s;
}

.form-control::placeholder {
	color: #8b8f98;
}

.form-control:focus {
	background: #1b1e25;
	border-color: var(--accent);
	box-shadow: 0 0 0 3px rgba(229,57,53,.25);
	color: var(--text-main);
}

/* ===== ERRORS ===== */
.error-text {
	font-size: .75rem;
	color: var(--danger);
	font-weight: 600;
	margin-top: 4px;
	display: block;
}

/* ===== CHECKBOX ===== */
.form-check-label {
	color: var(--text-muted);
	font-size: .85rem;
	font-weight: 500;
}

.form-check-input {
	accent-color: var(--accent);
}

/* ===== BUTTON ===== */
.btn-primary {
	width: 100%;
	padding: 12px;
	border-radius: 12px;
	border: none;
	font-weight: 800;
	font-size: .9rem;
	background: var(--accent);
	box-shadow: 0 15px 35px rgba(229,57,53,.45);
	transition: .3s;
}

.btn-primary:hover {
	background: #f44336;
	transform: translateY(-2px);
	box-shadow: 0 22px 50px rgba(229,57,53,.6);
}

/* ===== LINK ===== */
.small-link {
	color: var(--text-muted);
	font-size: .85rem;
	font-weight: 500;
}

.small-link a {
	color: var(--accent);
	font-weight: 700;
	text-decoration: none;
}

.small-link a:hover {
	color: var(--accent-soft);
}

/* ===== TOASTS ===== */
.toastify-container {
	position: fixed;
	top: 20px;
	right: 20px;
	z-index: 9999;
}

.toastify {
	min-width: 300px;
	border-radius: 12px;
	padding: 14px 18px;
	color: white;
	font-weight: 600;
	display: flex;
	align-items: center;
	gap: 12px;
	box-shadow: 0 15px 40px rgba(0,0,0,.6);
	animation: toastIn .4s ease forwards;
}

.toastify.success {
	background: linear-gradient(135deg, #22c55e, #16a34a);
}

.toastify.error {
	background: linear-gradient(135deg, #ff4081, #ff6a6a);
}

.toastify-close {
	width: 26px;
	height: 26px;
	border-radius: 50%;
	background: rgba(255,255,255,.25);
	border: none;
	color: white;
	font-size: 1.1rem;
	cursor: pointer;
	display: flex;
	align-items: center;
	justify-content: center;
	transition: .25s;
}

.toastify-close:hover {
	background: rgba(255,255,255,.4);
	transform: rotate(90deg);
}

/* ===== ANIMATIONS ===== */
@keyframes toastIn {
	from {opacity:0; transform:translateX(400px)}
	to {opacity:1; transform:translateX(0)}
}

@keyframes toastOut {
	from {opacity:1; transform:translateX(0)}
	to {opacity:0; transform:translateX(400px)}
}

@keyframes fadeInUp {
	from {opacity:0; transform:translateY(25px)}
	to {opacity:1; transform:translateY(0)}
}

@media (max-width:480px){
	.register-box{padding:35px}
}
</style>
</head>

<body>

<!-- TOASTS -->
<div class="toastify-container">
	<div th:if="${pass}" class="toastify success">
		<span th:text="${pass}"></span>
	</div>
	<div th:if="${fail}" class="toastify error">
		<span th:text="${fail}"></span>
	</div>
</div>

<!-- REGISTER -->
<div class="register-box">
	<h3>Create Account</h3>

	<form action="/register" method="post" th:object="${userDto}">

		<div class="mb-3">
			<label class="form-label">Name</label>
			<input class="form-control" th:field="*{name}">
			<span class="error-text" th:errors="*{name}"></span>
		</div>

		<div class="mb-3">
			<label class="form-label">Email</label>
			<input type="email" class="form-control" th:field="*{email}">
			<span class="error-text" th:errors="*{email}"></span>
		</div>

		<div class="mb-3">
			<label class="form-label">Mobile</label>
			<input class="form-control" th:field="*{mobile}">
			<span class="error-text" th:errors="*{mobile}"></span>
		</div>

		<div class="mb-3">
			<label class="form-label">Password</label>
			<input type="password" class="form-control" th:field="*{password}">
			<span class="error-text" th:errors="*{password}"></span>
		</div>

		<div class="mb-3">
			<label class="form-label">Confirm Password</label>
			<input type="password" class="form-control" th:field="*{confirmPassword}">
			<span class="error-text" th:errors="*{confirmPassword}"></span>
		</div>

		<div class="form-check mb-3">
			<input class="form-check-input" type="checkbox" th:field="*{terms}">
			<label class="form-check-label">I accept the terms & conditions</label>
			<span class="error-text" th:errors="*{terms}"></span>
		</div>

		<button class="btn btn-primary">Register</button>

		<div class="text-center mt-3 small-link">
			Already have an account? <a href="/login">Login</a>
		</div>

	</form>
</div>

<script>
document.addEventListener("DOMContentLoaded",()=>{
	document.querySelectorAll('.toastify').forEach(t=>{
		const btn=document.createElement('button');
		btn.className='toastify-close';
		btn.innerHTML='×';
		t.appendChild(btn);

		btn.onclick=()=>{
			t.style.animation='toastOut .3s ease forwards';
			setTimeout(()=>t.remove(),300);
		};

		setTimeout(()=>{
			if(document.body.contains(t)){
				t.style.animation='toastOut .3s ease forwards';
				setTimeout(()=>t.remove(),300);
			}
		},3500);
	});
});
</script>

</body>
</html>
