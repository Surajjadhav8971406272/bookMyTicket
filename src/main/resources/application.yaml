server:
  port: ${PORT:8080}

spring:
  application:
    name: book-my-ticket

  datasource:
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        '[format_sql]': true

  mail:
    host: smtp.gmail.com
    port: 587
    username: suraj.parvam@gmail.com
    password: ${APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

admin:
  email: admin@gmail.com
  password: admin

cloudinary:
  url: ${CLOUDINARY_URL}